name: Deploy Next.js to Plesk Server

on:
  push:
    branches:
      - main  # Trigger deployment on pushes to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup Node.js for initial build
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22  # Ensure compatibility with your Node.js version
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Run the first build to check for errors
      - name: Build and Test
        run: |
          npm run build  # Check if the build process succeeds locally

      # Step 5: Deploy to the server
      - name: Deploy to Server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_DOMAIN: ${{ secrets.SERVER_DOMAIN }}
        run: |
          # Set up SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add the server to known_hosts
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          
          # Transfer only the source files (excluding .next and other unnecessary files)
          rsync -av --exclude=".next" --exclude="node_modules" --exclude=".git" . $SERVER_USER@$SERVER_IP:/var/www/vhosts/$SERVER_DOMAIN/httpdocs/
          
          # Build the app on the server
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP << 'EOF'
            source ~/.bashrc  # Ensure nvm and Node.js are loaded
            cd /var/www/vhosts/$SERVER_DOMAIN/httpdocs
            npm install --production
            npm run build  # Perform production build on the server
            pm2 restart nextjs-app || pm2 start npm --name "nextjs-app" -- start
          EOF
