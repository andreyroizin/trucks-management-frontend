name: Deploy Next.js to Plesk Server

on:
  push:
    branches:
      - main  # Trigger deployment on pushes to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup Node.js for initial build
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22  # Ensure compatibility with your Node.js version
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Run the first build to check for errors
      - name: Build Locally
        run: npm run build

      # Step 5: Deploy to the server
      - name: Deploy to Server
        run: |
          # Set up SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add the server to known_hosts
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          
          # Ensure the target directory exists
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "mkdir -p /var/www/vhosts/${{ secrets.SERVER_DOMAIN }}/httpdocs"
          
          # Transfer only the source files (excluding .next and other unnecessary files)
          rsync -av --exclude=".next" --exclude="node_modules" --exclude=".git" . ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/vhosts/${{ secrets.SERVER_DOMAIN }}/httpdocs/
          
          # Build the app on the server
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            source ~/.bashrc  # Ensure nvm and Node.js are loaded
            cd /var/www/vhosts/${{ secrets.SERVER_DOMAIN }}/httpdocs
            npm install --production
            npm run build
            pm2 restart nextjs-app || pm2 start npm --name "nextjs-app" -- start
          EOF
